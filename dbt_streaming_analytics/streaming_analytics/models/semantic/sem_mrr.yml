semantic_models:
  - name: sem_mrr
    description: >
      Semantic model for Monthly Recurring Revenue. 
      IMPORTANT: This metric must not be joined to session-level data without an explicit bridge — doing so will cause a fanout.
    model: ref('fct_mrr_monthly')
    entities:
      - name: subscription
        type: primary
        expr: subscription_id
      - name: subscriber
        type: foreign
        expr: subscriber_id
    dimensions:
      - name: plan_type
        type: categorical
      - name: billing_cycle
        type: categorical
      - name: mrr_type
        type: categorical
      - name: period_month
        type: time
        type_params:
          time_granularity: month
    measures:
      - name: mrr_usd
        description: MRR in USD
        expr: case when is_active then mrr_usd else 0 end
        agg: sum
        agg_time_dimension: period_month
      - name: mrr_change_usd
        description: >
          Month-over-month MRR movement per subscription (new = full amount,
          expansion = upgrade delta, contraction = negative delta). Sum this
          filtered to a single mrr_type for MRR-movement metrics such as
          expansion_mrr, rather than summing full plan MRR.
        expr: mrr_change_usd
        agg: sum
        agg_time_dimension: period_month
      - name: monthly_churned_subscribers
        description: >
          Distinct subscribers whose subscription flipped active→inactive in the
          period month (mrr_type = 'churned'). Numerator for the monthly churn rate.
        expr: case when mrr_type = 'churned' then subscriber_id end
        agg: count_distinct
        agg_time_dimension: period_month
      - name: monthly_subscriber_base
        description: >
          Distinct subscribers with any non-inactive subscription row in the period
          month. Denominator for the monthly churn rate — intentionally matches the
          dashboard churn_rate_kpi formula (gateway/api/routes/dashboard.py) so the
          chat and dashboard always report the same number.
        expr: case when mrr_type != 'inactive' then subscriber_id end
        agg: count_distinct
        agg_time_dimension: period_month
      - name: active_subscribers_count
        description: >
          Distinct subscribers who are currently active (is_active = TRUE). 
          This perfectly matches the dashboard subs_kpi.
        expr: case when is_active = true then subscriber_id end
        agg: count_distinct
        agg_time_dimension: period_month
