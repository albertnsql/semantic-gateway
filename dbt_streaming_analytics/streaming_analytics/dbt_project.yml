name: 'streaming_analytics'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'streaming_analytics'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models", "metrics"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  streaming_analytics:
    staging:
      +schema: staging
      +materialized: view
      +tags: ["staging"]
    intermediate:
      +schema: intermediate
      +materialized: view
      +tags: ["intermediate"]
    marts:
      +schema: marts
      +materialized: table
      +tags: ["marts"]
